<div *ngIf="!(wakeupService.isReady$ | async)" class="wakeup-overlay">
  <div class="wakeup-container card animate-slide-up">
    <div class="logo">
      <img src="assets/logo.png" alt="PunchUp Logo" class="logo-img" />
      <span class="logo-text">PunchUp</span>
    </div>
    
    <div class="wakeup-spinner-container" *ngIf="!(wakeupService.hasFailed$ | async)">
      <div class="wakeup-ring-outer"></div>
      <div class="wakeup-ring-inner"></div>
    </div>
    
    <p class="loading-message">{{ wakeupService.statusMessage$ | async }}</p>
    
    <button *ngIf="wakeupService.hasFailed$ | async" (click)="wakeupService.retryPing()" class="btn btn-primary wakeup-retry-btn">
      Retry Connection
    </button>
  </div>
</div>

<div *ngIf="wakeupService.isReady$ | async">
  <div [class.app-layout]="showNavigation">
    <app-sidebar *ngIf="showNavigation"></app-sidebar>
    <main [class.main-content]="showNavigation" [class.public-main]="!showNavigation">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile Bottom Navigation — only shown on small screens when authenticated -->
  <nav class="mobile-bottom-nav" *ngIf="showNavigation">
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="mobile-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect>
        <rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect>
      </svg>
      <span>Dashboard</span>
    </a>
    <a routerLink="/tasks" routerLinkActive="active" class="mobile-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
      </svg>
      <span>Tasks</span>
    </a>
    <a routerLink="/notifications" routerLinkActive="active" class="mobile-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <span>Inbox</span>
    </a>
    <a routerLink="/community" routerLinkActive="active" class="mobile-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      <span>Community</span>
    </a>
    <a routerLink="/profile" routerLinkActive="active" class="mobile-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>Profile</span>
    </a>
  </nav>

  <app-command-palette *ngIf="isAuthenticated"></app-command-palette>

  <!-- Floating mobile theme toggle — only on mobile when navigation is active -->
  <button
    *ngIf="showNavigation"
    class="mobile-theme-toggle"
    (click)="toggleTheme()"
    [attr.aria-label]="(isDarkMode$ | async) ? 'Switch to light mode' : 'Switch to dark mode'"
    title="Toggle theme"
  >
    <!-- Moon icon — shown in dark mode -->
    <svg *ngIf="isDarkMode$ | async" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
    <!-- Sun icon — shown in light mode -->
    <svg *ngIf="!(isDarkMode$ | async)" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
  </button>
</div>

<app-toast></app-toast>
